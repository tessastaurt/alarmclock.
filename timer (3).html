<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Galaxy Cartoon Clock</title>
<style>
  body {
    margin: 0;
    overflow: hidden;
    background: black;
    font-family: 'Comic Sans MS', 'Poppins', cursive;
  }

  canvas {
    position: fixed;
    top: 0; left: 0;
    z-index: 0;
  }

  .clock {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    width: 320px; height: 320px;
    border-radius: 50%;
    background: radial-gradient(circle, #ffffff, #e0e0e0);
    border: 10px solid #ffb7b2;
    box-shadow:
      0 0 60px rgba(180,100,255,0.9),
      0 0 130px rgba(100,0,200,0.5),
      0 0 220px rgba(80,0,160,0.25),
      inset 0 0 20px rgba(0,0,0,0.3);
    z-index: 10;
  }

  .number {
    position: absolute;
    font-size: 26px; font-weight: bold;
    color: #333;
    text-shadow: 2px 2px 0px #fff;
    transform: translate(-50%, -50%);
    z-index: 11;
  }

  .tick {
    position: absolute;
    width: 2px; height: 8px;
    background: #888;
    top: 0; left: 50%;
    border-radius: 1px;
  }
  .tick.big { height: 18px; width: 3px; background: #333; }

  .tick-second {
    position: absolute;
    width: 1px; height: 5px;
    background: #bbb;
    top: 2px; left: 50%;
    border-radius: 1px;
  }

  .hand {
    position: absolute;
    bottom: 50%; left: 50%;
    transform-origin: bottom;
    transform: translateX(-50%);
    border-radius: 10px;
    z-index: 12;
  }

  .hour   { width: 8px;  height: 80px;  background: #444; }
  .minute { width: 5px;  height: 110px; background: #666; }
  .second { width: 2px;  height: 130px; background: #ff4d6d;
            box-shadow: 0 0 6px #ff4d6d; }

  .center {
    position: absolute;
    width: 14px; height: 14px;
    background: #333;
    border-radius: 50%;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    z-index: 13;
  }

  .ampm {
    position: absolute;
    top: 65%; left: 50%;
    transform: translateX(-50%);
    font-size: 18px; color: #555; font-weight: bold;
    z-index: 12;
  }

  .timer {
    position: absolute;
    top: 85%; left: 50%;
    transform: translateX(-50%);
    color: white; font-size: 26px;
    z-index: 10;
    text-shadow: 0 0 10px rgba(180,100,255,0.9);
  }

  .digital-time {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, calc(-50% - 230px));
    z-index: 15;
    text-align: center;
    pointer-events: none;
  }

  .digital-time .time-text {
    font-family: 'Courier New', monospace;
    font-size: 42px;
    font-weight: bold;
    color: #fff;
    letter-spacing: 4px;
    text-shadow:
      0 0 12px rgba(220, 160, 255, 1),
      0 0 28px rgba(180, 80, 255, 0.8),
      0 0 55px rgba(120, 0, 220, 0.5);
  }

  .digital-time .date-text {
    font-family: 'Courier New', monospace;
    font-size: 15px;
    color: rgba(200, 170, 255, 0.85);
    letter-spacing: 3px;
    text-transform: uppercase;
    text-shadow: 0 0 10px rgba(160, 80, 255, 0.7);
    margin-top: 4px;
  }

  .buttons {
    position: fixed;
    bottom: 20px; right: 20px;
    z-index: 20;
  }

  button {
    padding: 12px 18px; margin-left: 10px;
    border-radius: 10px; border: none; cursor: pointer;
  }
  .start { background: #b5ead7; }
  .stop  { background: #ffb7b2; }
</style>
</head>
<body>

<canvas id="space"></canvas>

<div class="digital-time">
  <div class="time-text" id="digital-time">12:00:00 AM</div>
  <div class="date-text" id="digital-date">Monday, Jan 01</div>
</div>

<div class="clock" id="clock">
  <div class="hand hour"   id="hour"></div>
  <div class="hand minute" id="minute"></div>
  <div class="hand second" id="second"></div>
  <div class="center"></div>
</div>

<div class="timer" id="timer">01:00</div>

<div class="buttons">
  <button class="start" onclick="startTimer()">Start</button>
  <button class="stop"  onclick="stopTimer()">Stop</button>
</div>

<script>
/* ══════════════════════════════════════
   CLOCK — second hand TICKS, not glides
   ══════════════════════════════════════ */
const hourEl   = document.getElementById("hour");
const minuteEl = document.getElementById("minute");
const secondEl = document.getElementById("second");

let lastSec = -1;

function updateClock() {
  const now = new Date();
  let h  = now.getHours();
  let m  = now.getMinutes();
  let s  = now.getSeconds();

  const ampm = h >= 12 ? "PM" : "AM";

  // Digital time display
  const days   = ["Sunday","Monday","Tuesday","Wednesday","Thursday","Friday","Saturday"];
  const months = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
  const hh = String(h === 0 ? 12 : h > 12 ? h - 12 : h).padStart(2,'0');
  const mm = String(m).padStart(2,'0');
  const ss = String(s).padStart(2,'0');
  document.getElementById("digital-time").textContent = `${hh}:${mm}:${ss} ${ampm}`;
  document.getElementById("digital-date").textContent =
    `${days[now.getDay()]}, ${months[now.getMonth()]} ${now.getDate()}`;

  h = h % 12;

  // Hour + minute glide smoothly
  hourEl.style.transform   = `translateX(-50%) rotate(${h*30 + m*0.5 + s*(0.5/60)}deg)`;
  minuteEl.style.transform = `translateX(-50%) rotate(${m*6 + s*0.1}deg)`;

  // Second hand TICKS — snaps to exact second position only when second changes
  if (s !== lastSec) {
    lastSec = s;
    secondEl.style.transform = `translateX(-50%) rotate(${s * 6}deg)`;
  }

  requestAnimationFrame(updateClock);
}
updateClock();

/* ── NUMBERS ── */
const clock = document.getElementById("clock");
for (let i = 1; i <= 12; i++) {
  let num = document.createElement("div");
  num.className = "number";
  num.innerText = i;
  let angle = i * 30 * Math.PI / 180;
  num.style.left = 160 + Math.sin(angle) * 130 + "px";
  num.style.top  = 160 - Math.cos(angle) * 130 + "px";
  clock.appendChild(num);
}

/* ── MINUTE TICKS ── */
for (let i = 0; i < 60; i++) {
  let t = document.createElement("div");
  t.className = "tick" + (i % 5 === 0 ? " big" : "");
  t.style.transformOrigin = "50% 160px";
  t.style.transform  = `rotate(${i*6}deg)`;
  t.style.top        = "0px";
  t.style.left       = "50%";
  t.style.marginLeft = "-1px";
  clock.appendChild(t);
}

/* ── SECOND TICKS ── */
for (let i = 0; i < 60; i++) {
  if (i % 5 === 0) continue;
  let t = document.createElement("div");
  t.className = "tick-second";
  t.style.transformOrigin = "50% 158px";
  t.style.transform  = `rotate(${i*6}deg)`;
  t.style.top        = "2px";
  t.style.left       = "50%";
  t.style.marginLeft = "-0.5px";
  clock.appendChild(t);
}

/* ── TIMER ── */
let timeLeft = 60, timerInterval = null;
const timerEl = document.getElementById("timer");

function updateTimer() {
  let m = String(Math.floor(timeLeft/60)).padStart(2,'0');
  let s = String(timeLeft%60).padStart(2,'0');
  timerEl.textContent = `${m}:${s}`;
}
function startTimer() {
  if (timerInterval) return;
  timeLeft = 60; updateTimer();
  timerInterval = setInterval(() => {
    timeLeft--;
    updateTimer();
    if (timeLeft <= 0) { clearInterval(timerInterval); timerInterval = null; alert("Time's up!"); }
  }, 1000);
}
function stopTimer() { clearInterval(timerInterval); timerInterval = null; }

/* ══════════════════════════════════════
   CANVAS — WARP STARS + BLACK HOLE
   ══════════════════════════════════════ */
const canvas = document.getElementById("space");
const ctx    = canvas.getContext("2d");

let W = canvas.width  = innerWidth;
let H = canvas.height = innerHeight;
let CX = W / 2, CY = H / 2;

/* ── WARP STARS ── */
const NUM_STARS = 700;
let stars = [];

function makeStar(scattered) {
  let angle = Math.random() * Math.PI * 2;
  let dist  = scattered ? Math.random() * Math.max(W, H) * 0.85 : Math.random() * 50;
  return {
    angle,
    dist,
    baseSpeed: 0.7 + Math.random() * 2.8,
    size:  0.4 + Math.random() * 2.0,
    // 15% of stars get a purple/blue tint for colour variety
    hue: Math.random() < 0.15 ? "rgba(190,170,255," : "rgba(255,255,255,"
  };
}

function initStars() {
  stars = [];
  for (let i = 0; i < NUM_STARS; i++) stars.push(makeStar(true));
}
initStars();

/* ── BLACK HOLE constants ── */
const BH_R   = 195;
const DISK_R = 395;

let tick = 0;

function draw() {
  tick += 0.018;

  /* ── Deep space background — black fading to deep purple ── */
  const bg = ctx.createRadialGradient(CX, CY, 0, CX, CY, Math.max(W, H) * 0.95);
  bg.addColorStop(0,    "#0f0020");
  bg.addColorStop(0.25, "#090016");
  bg.addColorStop(0.55, "#04000d");
  bg.addColorStop(1,    "#000000");
  ctx.fillStyle = bg;
  ctx.fillRect(0, 0, W, H);

  /* Soft drifting nebula wisps */
  for (let n = 0; n < 5; n++) {
    let nx = CX + Math.sin(tick * 0.08 + n * 1.26) * 280;
    let ny = CY + Math.cos(tick * 0.055 + n * 1.0)  * 210;
    let nr = 190 + n * 70;
    let g  = ctx.createRadialGradient(nx, ny, 0, nx, ny, nr);
    let r  = 35 + n * 14, b = 85 + n * 26;
    g.addColorStop(0, `rgba(${r},0,${b},0.075)`);
    g.addColorStop(1, "rgba(0,0,0,0)");
    ctx.fillStyle = g;
    ctx.fillRect(0, 0, W, H);
  }

  /* ════════════════════════════
     BLACK HOLE
  ════════════════════════════ */

  /* 1 — Outer gravitational distortion (wide soft rings) */
  for (let ring = 6; ring >= 1; ring--) {
    let ri = BH_R * (1 + ring * 0.48);
    let ro = BH_R * (1 + ring * 0.60);
    let g  = ctx.createRadialGradient(CX, CY, ri, CX, CY, ro);
    g.addColorStop(0, `rgba(100,0,200,${0.10 / ring})`);
    g.addColorStop(1, "rgba(0,0,0,0)");
    ctx.fillStyle = g;
    ctx.beginPath(); ctx.arc(CX, CY, ro, 0, Math.PI*2); ctx.fill();
  }

  /* 2 — Accretion disk (4 elliptical rotating layers) */
  ctx.save();
  ctx.translate(CX, CY);

  const LAYERS = [
    { speed: 0.36, scaleY: 0.21, inner: BH_R + 8,  outer: DISK_R * 0.90 },
    { speed: 0.54, scaleY: 0.29, inner: BH_R + 30, outer: DISK_R * 0.68 },
    { speed: 0.74, scaleY: 0.17, inner: BH_R + 5,  outer: DISK_R * 0.52 },
    { speed: 0.94, scaleY: 0.25, inner: BH_R + 18, outer: DISK_R * 0.38 },
  ];

  LAYERS.forEach((layer, li) => {
    ctx.save();
    ctx.rotate(tick * layer.speed);
    ctx.scale(1, layer.scaleY);

    for (let i = 0; i < 720; i++) {
      let a    = (i / 720) * Math.PI * 2;
      let frac = i / 720;
      let R    = Math.floor(80  + frac * 200);
      let G    = Math.floor(frac * 110);
      let B    = Math.floor(225 - frac * 205);
      let pulse = 0.4 + 0.6 * Math.sin(a * 4 + tick * 2.5);
      let alpha = (0.48 - li * 0.08) * pulse;

      let x1 = Math.cos(a) * layer.inner, y1 = Math.sin(a) * layer.inner;
      let x2 = Math.cos(a) * layer.outer, y2 = Math.sin(a) * layer.outer;

      let sg = ctx.createLinearGradient(x1, y1, x2, y2);
      sg.addColorStop(0,    `rgba(${R+60},${G+20},${B},${alpha})`);
      sg.addColorStop(0.55, `rgba(${R},${G},${Math.max(B-60,0)},${alpha*0.5})`);
      sg.addColorStop(1,    "rgba(0,0,0,0)");

      ctx.strokeStyle = sg;
      ctx.lineWidth   = 1.6;
      ctx.beginPath();
      ctx.moveTo(x1, y1);
      ctx.lineTo(x2, y2);
      ctx.stroke();
    }
    ctx.restore();
  });
  ctx.restore();

  /* 3 — Photon ring glow (3 passes, brightest closest) */
  for (let pass = 0; pass < 3; pass++) {
    let pr = ctx.createRadialGradient(
      CX, CY, BH_R - 2 + pass * 7,
      CX, CY, BH_R + 16 + pass * 12
    );
    let a = [0.75, 0.45, 0.20][pass];
    pr.addColorStop(0,   "rgba(255,220,255,0)");
    pr.addColorStop(0.3, `rgba(235,165,255,${a})`);
    pr.addColorStop(0.75,`rgba(160,80,255,${a*0.45})`);
    pr.addColorStop(1,   "rgba(0,0,0,0)");
    ctx.fillStyle = pr;
    ctx.beginPath(); ctx.arc(CX, CY, BH_R + 16 + pass*12, 0, Math.PI*2); ctx.fill();
  }

  /* 4 — Event horizon — pure solid black */
  ctx.beginPath();
  ctx.arc(CX, CY, BH_R, 0, Math.PI * 2);
  ctx.fillStyle = "#000000";
  ctx.fill();

  /* ════════════════════════════
     WARP STARS
  ════════════════════════════ */
  stars.forEach((s, idx) => {
    // Stars accelerate as they travel further — warp tunnel illusion
    let accel = 1 + (s.dist / 200) * 3.0;
    s.dist += s.baseSpeed * accel * 0.55;

    let x = CX + Math.cos(s.angle) * s.dist;
    let y = CY + Math.sin(s.angle) * s.dist;

    // Eaten by black hole
    let dx = x - CX, dy = y - CY;
    if (dx*dx + dy*dy < (BH_R + 15) * (BH_R + 15)) {
      stars[idx] = makeStar(false); return;
    }

    // Tail stretches with speed — long streaks at far distances
    let tailLen = s.baseSpeed * accel * (0.9 + s.dist / 160);
    let bx = CX + Math.cos(s.angle) * (s.dist - tailLen);
    let by = CY + Math.sin(s.angle) * (s.dist - tailLen);

    let alpha = Math.min(s.dist / 110, 1) * 0.88;
    let thick  = s.size * Math.min(1 + s.dist / 350, 3.0);

    let sg = ctx.createLinearGradient(bx, by, x, y);
    sg.addColorStop(0, `${s.hue}0)`);
    sg.addColorStop(1, `${s.hue}${alpha.toFixed(2)})`);

    ctx.strokeStyle = sg;
    ctx.lineWidth   = thick;
    ctx.beginPath();
    ctx.moveTo(bx, by);
    ctx.lineTo(x, y);
    ctx.stroke();

    if (x < -20 || x > W + 20 || y < -20 || y > H + 20) {
      stars[idx] = makeStar(false);
    }
  });

  requestAnimationFrame(draw);
}

draw();

window.addEventListener("resize", () => {
  W = canvas.width  = innerWidth;
  H = canvas.height = innerHeight;
  CX = W / 2; CY = H / 2;
  initStars();
});
</script>
</body>
</html>
